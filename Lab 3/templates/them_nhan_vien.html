<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Nhân Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; color: #2b3674; }
        
        .color-form { background: #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0;}
        .form-header { background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%); padding: 30px; color: white; text-align: center;}
        
        .btn-back { background: #fff; color: #4318FF; font-weight: 600; border-radius: 10px; padding: 8px 20px; box-shadow: 0px 4px 6px rgba(0,0,0,0.05); text-decoration: none; border: 1px solid #e2e8f0; transition: all 0.2s; display: inline-block;}
        .btn-back:hover { background: #4318FF; color: #fff; border-color: #4318FF; transform: translateY(-2px); box-shadow: 0px 8px 20px rgba(67, 24, 255, 0.2); }

        .form-label { font-weight: 600; color: #334155; font-size: 0.95rem; margin-bottom: 8px;}
        .fat-input { border-radius: 10px; border: 1px solid #e2e8f0; padding: 12px 18px; font-size: 1rem; font-weight: 500; background: #fff; transition: 0.3s; color: #2b3674;}
        .fat-input:focus { background: #fff; border-color: #00b09b; box-shadow: 0 0 0 4px rgba(0, 176, 155, 0.15); outline: none; }
        
        /* Hiệu ứng đỏ khi chưa nhập trường bắt buộc */
        .fat-input:invalid:focus { border-color: #e11d48; box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1); }
        form:submitted .fat-input:invalid { border-color: #e11d48; }

        .section-badge { display: inline-block; background: #00b09b; color: #fff; padding: 6px 16px; border-radius: 12px; font-weight: 600; margin-bottom: 20px; font-size: 0.95rem; box-shadow: 0 4px 10px rgba(0,176,155,0.2);}
        .form-section { padding: 35px 40px; border-bottom: 1px solid #f1f5f9; }
        
        .btn-mega { background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%); color: white; border: none; border-radius: 12px; padding: 16px 30px; font-weight: 600; font-size: 1.1rem; width: 100%; transition: 0.3s; box-shadow: 0 8px 15px rgba(0, 176, 155, 0.2); }
        .btn-mega:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(0, 176, 155, 0.3); color: #fff;}
        
        /* Dấu sao đỏ cho trường bắt buộc */
        .text-danger { color: #e11d48 !important; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="fw-bold mb-0" style="color: #4318FF;">Quản Lý Hồ Sơ</h2>
                    <a href="{{ url_for('index') }}" class="btn-back">⬅ Trở về Dashboard</a>
                </div>

                <div class="color-form">
                    <div class="form-header">
                        <h2 class="fw-bold mb-0">✨ Thêm Nhân Sự Mới</h2>
                    </div>

                    <form method="POST" class="needs-validation">
                        <div class="form-section">
                            <div class="section-badge">1. Thông Tin Cơ Bản</div>
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">Họ và Tên <span class="text-danger">*</span></label>
                                    <input type="text" name="ho_ten" class="form-control fat-input" placeholder="Nguyễn Văn A" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Ngày Sinh <span class="text-danger">*</span></label>
                                    <input type="date" name="ngay_sinh" class="form-control fat-input" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Giới Tính <span class="text-danger">*</span></label>
                                    <select name="gioi_tinh" class="form-select fat-input" required>
                                        <option value="" disabled selected>Chọn...</option>
                                        <option value="Nam">Nam</option>
                                        <option value="Nữ">Nữ</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="section-badge" style="background:#4318FF; box-shadow: 0 4px 10px rgba(67,24,255,0.2);">2. Liên Hệ</div>
                            <div class="mb-4">
                                <label class="form-label">Địa Chỉ Thường Trú <span class="text-danger">*</span></label>
                                <input type="text" name="dia_chi" class="form-control fat-input" placeholder="Số nhà, tên đường..." required>
                            </div>
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">Số Điện Thoại <span class="text-danger">*</span></label>
                                    <input type="text" name="so_dien_thoai" class="form-control fat-input" placeholder="0901234567" required pattern="[0-9]{10,11}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email <span class="text-danger">*</span></label>
                                    <input type="email" name="email" class="form-control fat-input" placeholder="example@gmail.com" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="section-badge" style="background:#f59e0b; box-shadow: 0 4px 10px rgba(245,158,11,0.2);">3. Công Tác</div>
                            <div class="row g-4">
                                <div class="col-md-4">
                                    <label class="form-label">Ngày Vào Làm <span class="text-danger">*</span></label>
                                    <input type="date" name="ngay_vao_lam" class="form-control fat-input" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Phòng Ban <span class="text-danger">*</span></label>
                                    <input type="text" name="phong_ban" class="form-control fat-input" placeholder="Phòng Kế toán" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Chức Vụ <span class="text-danger">*</span></label>
                                    <input type="text" name="chuc_vu" class="form-control fat-input" placeholder="Nhân viên" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-section" style="background-color: #f8fafc;">
                            <div class="section-badge" style="background:#e11d48; box-shadow: 0 4px 10px rgba(225,29,72,0.2);">4. Lương Khởi Điểm (Tùy chọn)</div>
                            <div class="row g-4">
                                <div class="col-md-3">
                                    <label class="form-label text-danger">Lương cơ bản</label>
                                    <input type="number" name="luong_co_ban" class="form-control fat-input border-danger" value="0" min="0">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Phụ cấp</label>
                                    <input type="number" name="phu_cap" class="form-control fat-input" value="0" min="0">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Thưởng</label>
                                    <input type="number" name="thuong" class="form-control fat-input" value="0" min="0">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label text-danger">Khấu trừ</label>
                                    <input type="number" name="khau_tru" class="form-control fat-input" value="0" min="0" style="border-color: #fda4af;">
                                </div>
                            </div>
                        </div>

                        <div class="p-4 bg-white text-center">
                            <button type="submit" class="btn-mega">🔥 Lưu & Đồng Bộ Hệ Thống</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
