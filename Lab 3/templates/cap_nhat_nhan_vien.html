<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập Nhật Hồ Sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f4f7f6; color: #2d3436; }
        .color-form { background: #fff; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); overflow: hidden; border: none;}
        .form-header { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); padding: 35px; color: #2d3436; text-align: center;}
        
        .form-label { font-weight: 800; color: #2d3436; font-size: 1.05rem; }
        .fat-input { border-radius: 12px; border: 2px solid #dfe6e9; padding: 14px 20px; font-size: 1.1rem; font-weight: 600; background: #fafafa; transition: 0.3s; color: #2d3436;}
        .fat-input:focus { background: #fff; border-color: #ff9a9e; box-shadow: 0 0 0 5px rgba(255, 154, 158, 0.2); outline: none; }
        
        .section-badge { display: inline-block; background: #ff9a9e; color: #fff; padding: 5px 15px; border-radius: 20px; font-weight: 800; margin-bottom: 20px; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(255, 154, 158, 0.4); text-shadow: 1px 1px 2px rgba(0,0,0,0.1);}
        .form-section { padding: 40px; border-bottom: 3px dashed #f1f2f6; }
        
        .btn-mega { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #2d3436; border: none; border-radius: 15px; padding: 16px 30px; font-weight: 900; font-size: 1.2rem; width: 100%; transition: 0.3s; box-shadow: 0 10px 20px rgba(255, 154, 158, 0.3); }
        .btn-mega:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 154, 158, 0.5); color: #000;}
        .btn-back { font-weight: 800; color: #636e72; text-decoration: none; font-size: 1.1rem; transition: 0.2s;}
        .btn-back:hover { color: #000; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="mb-4">
                    <a href="{{ url_for('in_danh_sach') }}" class="btn-back">⬅ Trở về Danh Sách</a>
                </div>

                <div class="color-form">
                    <div class="form-header">
                        <h1 class="fw-bold mb-0">✏️ Sửa Hồ Sơ: #{{ nv_sql.MaNV if nv_sql else nv_mysql.MaNV }}</h1>
                    </div>

                    <form method="POST">
                        <div class="form-section">
                            <div class="section-badge">1. Cá Nhân</div>
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">Họ và Tên</label>
                                    <input type="text" name="ho_ten" class="form-control fat-input" value="{{ nv_sql.HoTen if nv_sql else nv_mysql.HoTen }}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Ngày Sinh</label>
                                    <input type="date" name="ngay_sinh" class="form-control fat-input" value="{{ (nv_sql.NgaySinh if nv_sql else nv_mysql.NgaySinh).strftime('%Y-%m-%d') if (nv_sql and nv_sql.NgaySinh) or (nv_mysql and nv_mysql.NgaySinh) else '' }}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Giới Tính</label>
                                    <select name="gioi_tinh" class="form-select fat-input">
                                        <option value="Nam" {% if (nv_sql and nv_sql.GioiTinh == 'Nam') or (nv_mysql and nv_mysql.GioiTinh == 'Nam') %} selected {% endif %}>Nam</option>
                                        <option value="Nữ" {% if (nv_sql and nv_sql.GioiTinh == 'Nữ') or (nv_mysql and nv_mysql.GioiTinh == 'Nữ') %} selected {% endif %}>Nữ</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="section-badge" style="background:#a29bfe; box-shadow: 0 4px 10px rgba(162,155,254,0.4);">2. Liên Lạc</div>
                            <div class="mb-4">
                                <label class="form-label">Địa Chỉ Thường Trú</label>
                                <input type="text" name="dia_chi" class="form-control fat-input" value="{{ nv_sql.DiaChi if nv_sql else '' }}">
                            </div>
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">Số Điện Thoại</label>
                                    <input type="text" name="so_dien_thoai" class="form-control fat-input" value="{{ nv_sql.SoDienThoai if nv_sql else nv_mysql.SoDienThoai }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email</label>
                                    <input type="email" name="email" class="form-control fat-input" value="{{ nv_sql.Email if nv_sql else nv_mysql.Email }}">
                                </div>
                            </div>
                        </div>

                        <div class="form-section pb-5">
                            <div class="section-badge" style="background:#00cec9; box-shadow: 0 4px 10px rgba(0,206,201,0.4);">3. Đơn Vị Công Tác</div>
                            <div class="row g-4">
                                <div class="col-md-4">
                                    <label class="form-label">Ngày Vào Làm</label>
                                    <input type="date" name="ngay_vao_lam" class="form-control fat-input" value="{{ (nv_sql.NgayVaoLam if nv_sql else nv_mysql.NgayVaoLam).strftime('%Y-%m-%d') if (nv_sql and nv_sql.NgayVaoLam) or (nv_mysql and nv_mysql.NgayVaoLam) else '' }}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Phòng Ban</label>
                                    <input type="text" name="phong_ban" class="form-control fat-input" value="{{ nv_mysql.PhongBan if nv_mysql else '' }}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Chức Vụ</label>
                                    <input type="text" name="chuc_vu" class="form-control fat-input" value="{{ nv_mysql.ChucVu if nv_mysql else '' }}">
                                </div>
                            </div>
                        </div>

                        <div class="p-5 bg-white text-center">
                            <button type="submit" class="btn-mega">Lưu Thay Đổi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
