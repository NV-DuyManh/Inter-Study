<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Tích Hợp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); 
            min-height: 100vh;
            color: #212529;
        }
        .app-title { font-weight: 800; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); letter-spacing: 1px;}
        
        .color-card { 
            background: #fff; 
            border-radius: 24px; 
            border: none; 
            padding: 30px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            text-decoration: none; 
            color: inherit; 
            display: block; 
        }
        .color-card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); 
        }
        
        .icon-circle { 
            width: 90px; height: 90px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3rem; margin: 0 auto 20px; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .color-card:hover .icon-circle { transform: scale(1.15) rotate(10deg); }
        
        .c-green { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .c-orange { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        .c-purple { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
        
        .card-title { font-weight: 800; font-size: 1.4rem; color: #2d3436; }
        .card-desc { color: #636e72; font-size: 1rem; font-weight: 600; line-height: 1.5;}
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5 mt-4">
            <h1 class="display-4 app-title mb-2">DASHBOARD TÍCH HỢP</h1>
            <p class="fs-5 text-white fw-bold opacity-75">Quản Trị Nhân Sự & Lương Bổng Hiện Đại</p>
        </div>

        <div class="row g-4 justify-content-center mt-3">
            <div class="col-md-4">
                <a href="{{ url_for('them_nhan_vien') }}" class="color-card text-center">
                    <div class="icon-circle c-green shadow-sm">🚀</div>
                    <h3 class="card-title">Thêm Nhân Sự</h3>
                    <p class="card-desc mt-2">Khởi tạo và tự động đồng bộ hồ sơ lên SQL Server & MySQL.</p>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{{ url_for('in_bang_luong') }}" class="color-card text-center">
                    <div class="icon-circle c-orange shadow-sm">💎</div>
                    <h3 class="card-title">Bảng Lương</h3>
                    <p class="card-desc mt-2">Xem chi tiết phụ cấp, thưởng và khấu trừ với giao diện trực quan.</p>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{{ url_for('in_danh_sach') }}" class="color-card text-center">
                    <div class="icon-circle c-purple shadow-sm">🎯</div>
                    <h3 class="card-title">Quản Lý Hồ Sơ</h3>
                    <p class="card-desc mt-2">Xem danh sách, sửa chữa thông tin và xóa nhân viên an toàn.</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
