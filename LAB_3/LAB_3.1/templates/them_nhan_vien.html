<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm Nhân Viên & Lương</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow p-4">
            <form method="POST">
                <h3 class="text-primary mb-4">Thông tin cá nhân</h3>
                <div class="row mb-3">
                    <div class="col-md-6"><label>Họ và Tên</label><input type="text" name="ho_ten" class="form-control" required></div>
                    <div class="col-md-3"><label>Ngày Sinh</label><input type="date" name="ngay_sinh" class="form-control"></div>
                    <div class="col-md-3"><label>Giới Tính</label><select name="gioi_tinh" class="form-select"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select></div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-12"><label>Địa Chỉ</label><input type="text" name="dia_chi" class="form-control"></div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-4"><label>Số Điện Thoại</label><input type="text" name="so_dien_thoai" class="form-control"></div>
                    <div class="col-md-4"><label>Email</label><input type="email" name="email" class="form-control"></div>
                    <div class="col-md-4"><label>Ngày Vào Làm</label><input type="date" name="ngay_vao_lam" class="form-control"></div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6"><label>Phòng Ban</label><input type="text" name="phong_ban" class="form-control"></div>
                    <div class="col-md-6"><label>Chức Vụ</label><input type="text" name="chuc_vu" class="form-control"></div>
                </div>

                <h3 class="text-success mt-4 mb-4">Thiết lập lương</h3>
                <div class="row mb-4">
                    <div class="col-md-3"><label>Lương cơ bản</label><input type="number" name="luong_co_ban" class="form-control" value="0"></div>
                    <div class="col-md-3"><label>Phụ cấp</label><input type="number" name="phu_cap" class="form-control" value="0"></div>
                    <div class="col-md-3"><label>Thưởng</label><input type="number" name="thuong" class="form-control" value="0"></div>
                    <div class="col-md-3"><label>Khấu trừ</label><input type="number" name="khau_tru" class="form-control" value="0"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Lưu nhân viên & Lương</button>
            </form>
        </div>
    </div>
</body>
</html>
