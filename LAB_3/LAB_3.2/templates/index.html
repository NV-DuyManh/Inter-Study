<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR & Payroll Integrated System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      body {
        background-color: #f0f2f5;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .hero-section {
        background: var(--primary-gradient);
        color: white;
        padding: 60px 0;
        border-radius: 0 0 50px 50px;
        margin-bottom: 40px;
      }
      .card-menu {
        border: none;
        border-radius: 20px;
        transition: all 0.3s ease;
        text-decoration: none;
        color: inherit;
        overflow: hidden;
      }
      .card-menu:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
      }
      .icon-box {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="hero-section text-center shadow">
      <h1 class="display-4 fw-bold">DASHBOARD TÍCH HỢP</h1>
      <p class="lead opacity-75">
        Quản lý đồng bộ dữ liệu SQL Server (HR) & MySQL (Payroll)
      </p>
    </div>

    <div class="container">
      <div class="row g-4 justify-content-center">
        <div class="col-md-4">
          <a
            href="{{ url_for('in_danh_sach') }}"
            class="card card-menu h-100 p-4 bg-white text-center"
          >
            <div class="icon-box bg-primary bg-opacity-10 text-primary">
              <i class="fas fa-users"></i>
            </div>
            <h3 class="fw-bold">Danh Sách Nhân Sự</h3>
            <p class="text-muted">
              Xem, sửa, xóa dữ liệu nhân viên tích hợp từ hai nguồn.
            </p>
          </a>
        </div>
        <div class="col-md-4">
          <a
            href="{{ url_for('them_nhan_vien') }}"
            class="card card-menu h-100 p-4 bg-white text-center"
          >
            <div class="icon-box bg-success bg-opacity-10 text-success">
              <i class="fas fa-user-plus"></i>
            </div>
            <h3 class="fw-bold">Thêm Nhân Viên</h3>
            <p class="text-muted">
              Khởi tạo hồ sơ mới đồng bộ lên toàn hệ thống.
            </p>
          </a>
        </div>
        <div class="col-md-4">
          <a
            href="{{ url_for('in_bang_luong') }}"
            class="card card-menu h-100 p-4 bg-white text-center"
          >
            <div class="icon-box bg-warning bg-opacity-10 text-warning">
              <i class="fas fa-file-invoice-dollar"></i>
            </div>
            <h3 class="fw-bold">Báo Cáo Lương</h3>
            <p class="text-muted">
              Tổng hợp thu nhập dựa trên dữ liệu HR & Payroll.
            </p>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
